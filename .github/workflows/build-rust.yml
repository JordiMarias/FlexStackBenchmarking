name: Build Rust Binaries

on:
  push:
    branches: [master]
    paths:
      - "rust/**"
      - ".github/workflows/build-rust.yml"
  pull_request:
    branches: [master]
    paths:
      - "rust/**"
      - ".github/workflows/build-rust.yml"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: flexstack-bench-x86_64
          - target: aarch64-unknown-linux-musl
            artifact: flexstack-bench-aarch64

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: ${{ matrix.target }}

      - name: Build release binary (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        working-directory: rust
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (aarch64 via cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        working-directory: rust
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cross build --release --target ${{ matrix.target }}

      - name: Verify static linking
        run: |
          file rust/target/${{ matrix.target }}/release/flexstack-bench
          ! ldd rust/target/${{ matrix.target }}/release/flexstack-bench 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rust/target/${{ matrix.target }}/release/flexstack-bench
          if-no-files-found: error
