name: Build Rust Binaries

on:
  push:
    branches: [main]
    paths:
      - "rust/**"
      - ".github/workflows/build-rust.yml"
  pull_request:
    branches: [main]
    paths:
      - "rust/**"
      - ".github/workflows/build-rust.yml"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: flexstack-bench-x86_64
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: flexstack-bench-aarch64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          wget -qO- https://musl.cc/aarch64-linux-musl-cross.tgz | sudo tar xz -C /opt
          echo "/opt/aarch64-linux-musl-cross/bin" >> "$GITHUB_PATH"

      - name: Configure cargo for aarch64 cross-linker
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-musl-gcc"
          EOF

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: ${{ matrix.target }}

      - name: Build release binary
        working-directory: rust
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify static linking
        run: |
          file rust/target/${{ matrix.target }}/release/flexstack-bench
          ! ldd rust/target/${{ matrix.target }}/release/flexstack-bench 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rust/target/${{ matrix.target }}/release/flexstack-bench
          if-no-files-found: error
