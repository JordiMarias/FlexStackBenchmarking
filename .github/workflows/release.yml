name: Release Rust Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            binary_name: flexstack-bench-x86_64-linux
          - target: aarch64-unknown-linux-musl
            binary_name: flexstack-bench-aarch64-linux

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: ${{ matrix.target }}

      - name: Build release binary (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        working-directory: rust
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (aarch64 via cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        working-directory: rust
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp rust/target/${{ matrix.target }}/release/flexstack-bench ${{ matrix.binary_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          cp artifacts/flexstack-bench-x86_64-linux/flexstack-bench-x86_64-linux release/
          cp artifacts/flexstack-bench-aarch64-linux/flexstack-bench-aarch64-linux release/
          chmod +x release/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
