---
# ──────────────────────────────────────────────────────────────────────────────
# FlexStack Benchmarking — Run Playbook
# ──────────────────────────────────────────────────────────────────────────────
#
# Launches the full benchmark matrix on remote hosts in the background via
# nohup, so the Ansible connection can be closed immediately.  The benchmarks
# continue running on the remote host unattended.
#
# Usage:
#   ansible-playbook -i inventory.yml run.yml
#
# What it does:
#   1. Prepares the system (CPU governor, turbo boost, swap, etc.)
#   2. Generates a wrapper shell script from the bench_modes matrix
#   3. Launches the script in the background with nohup
#   4. Disconnects — benchmarks keep running on the remote host
#
# To check progress:
#   ssh pi@<host> tail -f ~/FlexStackBenchmarking/results/bench_run.log
#
# To collect results after completion:
#   ansible-playbook -i inventory.yml fetch_results.yml
# ──────────────────────────────────────────────────────────────────────────────

- name: Run FlexStack Benchmarks (background)
  hosts: all
  become: true

  vars:
    venv_dir: "{{ bench_dir }}/venv"
    pypy_bin: "{{ bench_dir }}/pypy/bin/pypy3"
    cpython_bin: "{{ venv_dir }}/bin/python3"
    rust_bin: "{{ bench_dir }}/rust/target/release/flexstack-bench"
    python_bench: "{{ bench_dir }}/python/benchmark.py"
    timestamp: "{{ ansible_date_time.iso8601_basic_short }}"
    results_csv: "{{ bench_dir }}/results/results_{{ bench_platform }}_{{ timestamp }}.csv"
    run_script: "{{ bench_dir }}/results/bench_run_{{ timestamp }}.sh"
    run_log: "{{ bench_dir }}/results/bench_run.log"
    run_pidfile: "{{ bench_dir }}/results/bench_run.pid"

  tasks:
    # ── System preparation ─────────────────────────────────────────────────
    - name: Run system preparation script
      command:
        cmd: bash {{ bench_dir }}/scripts/prepare_system.sh {{ bench_platform }}
      changed_when: true
      tags: [prepare]

    # ── Check no benchmark already running ─────────────────────────────────
    - name: Check for existing benchmark process
      shell: |
        if [ -f {{ run_pidfile }} ] && kill -0 $(cat {{ run_pidfile }}) 2>/dev/null; then
          echo "RUNNING"
        else
          echo "IDLE"
        fi
      args:
        executable: /bin/bash
      register: bench_status
      changed_when: false

    - name: Fail if benchmarks already running
      fail:
        msg: >
          A benchmark is already running on {{ inventory_hostname }}
          (PID {{ lookup('pipe', 'echo') }}).
          Check: ssh {{ ansible_user }}@{{ ansible_host }} tail -f {{ run_log }}
          To force restart, kill the process and remove {{ run_pidfile }}.
      when: bench_status.stdout == "RUNNING"

    # ── Generate benchmark wrapper script ──────────────────────────────────
    - name: Ensure results directory exists
      file:
        path: "{{ bench_dir }}/results"
        state: directory
        mode: "0755"

    - name: Generate benchmark runner script
      copy:
        dest: "{{ run_script }}"
        mode: "0755"
        content: |
          #!/bin/bash
          # Auto-generated by Ansible — {{ timestamp }}
          set -euo pipefail
          echo $$ > {{ run_pidfile }}
          exec > >(tee -a {{ run_log }}) 2>&1

          echo "============================================================"
          echo "FlexStack Benchmark — {{ inventory_hostname }} ({{ bench_platform }})"
          echo "Started: $(date)"
          echo "Results: {{ results_csv }}"
          echo "============================================================"

          {% for cell in bench_modes %}
          {% for impl in cell.impl %}
          {% set warmup = bench_warmup_pypy if impl == 'pypy' else (bench_warmup_cpython if impl == 'cpython' else bench_warmup_rust) %}
          echo ""
          echo "================================================================"
          echo "  {{ impl }} | {{ cell.mode }} | security={{ cell.security }}"
          echo "================================================================"
          for RUN in $(seq 1 {{ bench_runs }}); do
            echo "[$(date '+%H:%M:%S')] {{ impl }} | {{ cell.mode }} | {{ cell.security }} | run $RUN/{{ bench_runs }}"
          {% if impl == 'rust' %}
            chrt -f 50 taskset -c {{ bench_cores }} \
              {{ rust_bin }} \
              --mode {{ cell.mode }} --security {{ cell.security }} \
              --duration {{ bench_duration }} --warmup {{ warmup }} \
              --output {{ results_csv }} --run-id $RUN \
              --platform {{ bench_platform }} \
              --interface {{ bench_interface }} || echo "  [WARN] exited with error"
          {% elif impl == 'cpython' %}
            chrt -f 50 taskset -c {{ bench_cores }} \
              {{ cpython_bin }} {{ python_bench }} \
              --mode {{ cell.mode }} --security {{ cell.security }} \
              --duration {{ bench_duration }} --warmup {{ warmup }} \
              --output {{ results_csv }} --run-id $RUN \
              --platform {{ bench_platform }} \
              --interface {{ bench_interface }} || echo "  [WARN] exited with error"
          {% elif impl == 'pypy' %}
            chrt -f 50 taskset -c {{ bench_cores }} \
              {{ pypy_bin }} {{ python_bench }} \
              --mode {{ cell.mode }} --security {{ cell.security }} \
              --duration {{ bench_duration }} --warmup {{ warmup }} \
              --output {{ results_csv }} --run-id $RUN \
              --platform {{ bench_platform }} \
              --interface {{ bench_interface }} || echo "  [WARN] exited with error"
          {% endif %}
            if [ "$RUN" -lt {{ bench_runs }} ]; then
              echo "  Cooling down ({{ bench_cooldown }}s)..."
              sleep {{ bench_cooldown }}
            fi
          done

          {% endfor %}
          {% endfor %}
          echo ""
          echo "============================================================"
          echo "All benchmarks complete: $(date)"
          echo "Results: {{ results_csv }}"
          echo "============================================================"
          rm -f {{ run_pidfile }}

    # ── Launch in background ───────────────────────────────────────────────
    - name: Launch benchmarks in background
      shell: |
        nohup bash {{ run_script }} </dev/null >{{ run_log }} 2>&1 &
        echo $!
      args:
        executable: /bin/bash
      register: launch_result
      changed_when: true

    - name: Print launch summary
      debug:
        msg: |
          ═══════════════════════════════════════════════════════
          Benchmarks launched on {{ inventory_hostname }}
          ═══════════════════════════════════════════════════════
            PID      : {{ launch_result.stdout }}
            Platform : {{ bench_platform }}
            Log      : {{ run_log }}
            Results  : {{ results_csv }}

            Monitor progress:
              ssh {{ ansible_user }}@{{ ansible_host }} tail -f {{ run_log }}

            Fetch results when done:
              ansible-playbook -i inventory.yml fetch_results.yml
          ═══════════════════════════════════════════════════════
      tags: [always]
